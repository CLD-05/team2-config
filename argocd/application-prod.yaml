apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-ops-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/CLD-05/team2-config.git
    targetRevision: HEAD
    path: apps/resource-ops/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: resource-ops-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
