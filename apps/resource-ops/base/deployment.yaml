apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resource-app
    spec:
      serviceAccountName: resource-app-sa
      containers:
        - name: resource-app
          image: team2-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: resource-app-config
            - secretRef:
                name: resource-app-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
