apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resource-app-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: resource-app-secret
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: REPLACE_WITH_RDS_MASTER_SECRET_ARN
        property: username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: REPLACE_WITH_RDS_MASTER_SECRET_ARN
        property: password
